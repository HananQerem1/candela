<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Review your selected Candela candles, update quantities, and proceed to checkout. Complete your order and enjoy a warm, elegant experience.">
    <link rel="stylesheet" href="./assets/css/output.css"/>
    <title>Cart</title>
</head>
<body>
    <header class="py-4 position: fixed w-full z-2 bg-bg border-b border-fg">
        <div class="container row-between">
            <div class="logo max-md:w-20">
                <a href="./index.html"><img src="./assets/img/icons/logo/logo.svg" alt="candela logo"/></a>
            </div>
            <nav class="links hidden md:block">
                <ul class="row-between gap-8">
                    <li><a class="max-lg:text-[14.5px] link-hover" href="./index.html">home</a></li>
                    <li><a class="max-lg:text-[14.5px] link-hover" href="./shop.html">shop</a></li>
                    <li><a class="max-lg:text-[14.5px] link-hover" href="./packages.html">packages</a></li>
                    <li><a class="max-lg:text-[14.5px] link-hover" href="./contact.html">contact</a></li>
                </ul>
            </nav>
            <nav class="icons hidden md:block">
                <ul class="row-between gap-4">
                    <li class="icon-hover group w-5">
                        <span class="icon-hover-bg-fg"></span>
                        <a class="icon-hover-content" href="./wishlist.html">
                            <img src="./assets/img/icons/ui-icons/heart-black.svg" alt="favarites icon" class="group-hover:hidden"/>
                            <img src="./assets/img/icons/ui-icons/heart-white.svg" alt="favarites icon" class="hidden group-hover:block"/>
                        </a>
                    </li>
                    <li class="icon-hover group w-5">
                        <span class="icon-hover-bg-fg"></span>
                        <a class="icon-hover-content" href="./cart.html">
                            <img src="./assets/img/icons/ui-icons/cart-black.svg" alt="cart icon" class="group-hover:hidden"/>
                            <img src="./assets/img/icons/ui-icons/cart-white.svg" alt="cart icon" class="hidden group-hover:block"/>
                        </a>
                    </li>
                    <li class="icon-hover group w-5">
                        <span class="icon-hover-bg-fg"></span>
                        <a class="icon-hover-content" href="./account.html">
                            <img src="./assets/img/icons/ui-icons/user-black.svg" alt="user icon" class="group-hover:hidden"/>
                            <img src="./assets/img/icons/ui-icons/user-white.svg" alt="user icon" class="hidden group-hover:block"/>
                        </a>
                    </li>
                </ul>
            </nav>
            <button class="icon-hover group w-5 md:hidden">
                <span class="icon-hover-bg-fg"></span>
                <img class="icon-hover-content" src="./assets/img/icons/ui-icons/bars.svg" alt="bars icon" />
            </button>
        </div>
    </header>
    <main>
        <section class="wishlist-empty-state column-center gap-4 w pt-30 sm:pt-35">
            <div class="column-center gap-5 w-[75%]">
                <div class="w-15 lg:w-20 xl:w-25 p-4 lg:p-5.5 xl:p-7 bg-bg-secondary rounded-full">
                    <img 
                      src="./assets/img/icons/ui-icons/cart-black.svg" 
                      alt="cart icon"
                    />
                </div>
                <h2>your cart is empty</h2>
                <p>Start adding your items to fill your cart and bring warmth to your space.</p>
                <a href="./shop.html" class="button-primary center gap-1 w-[60%] sm:w-[45%] md:w-[35%] xl:w-[25%]">
                    <img src="./assets/img/icons/ui-icons/sparkle.svg" class="w-5" />
                    discover candles
                </a>
            </div>
        </section>
    </main>
</body>
</html>
